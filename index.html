<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KPOP AI</title>
</head>
<body>
  <h1>KPOP 여행 추천</h1>
  <input id="city" placeholder="도시 입력" />
  <button onclick="search()">추천받기</button>

  <pre id="result"></pre>

  <script>
    async function search() {
      const city = document.getElementById("city").value;

      const res = await fetch("https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=YOUR_API_KEY", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                { text: city + " KPOP 여행 추천 3개 해줘" }
              ]
            }
          ]
        })
      });

      const data = await res.json();
      document.getElementById("result").innerText =
        data.candidates[0].content.parts[0].text;
    }
  </script>
</body>
</html>
